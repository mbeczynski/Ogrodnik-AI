name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build & Push app
      - name: Extract metadata (tags, labels) for App
        id: meta-app
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ogrodnik-ai
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push App image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/app.Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=ogrodnik-app
          cache-to: type=gha,mode=max,scope=ogrodnik-app

      # Build & Push db (sqlite-web)
      - name: Extract metadata (tags, labels) for DB Web
        id: meta-db
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ogrodnik-db
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push DB image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/db.Dockerfile
          push: true
          tags: ${{ steps.meta-db.outputs.tags }}
          labels: ${{ steps.meta-db.outputs.labels }}
          cache-from: type=gha,scope=ogrodnik-db
          cache-to: type=gha,mode=max,scope=ogrodnik-db


