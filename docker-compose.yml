services:
  ogrodnik-ai:
    build: .
    image: ogrodnik-ai:latest
    container_name: ogrodnik-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Baza SQLite, zdjęcia akcji i mapy ogrodu - trwałe między restartami/rebuildami.
      - ogrodnik_data:/app/data
    # Jeśli Home Assistant działa lokalnie na tej samej maszynie (np. jako kolejny
    # kontener albo na hoście), a "http://homeassistant.local:8123" nie jest
    # widoczne z wewnątrz kontenera, odkomentuj poniższe i ustaw HA_BASE_URL na
    # http://host.docker.internal:8123 w .env:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

volumes:
  ogrodnik_data:
