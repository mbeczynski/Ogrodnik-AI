services:
  ogrodnik-ai:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: ghcr.io/mbeczynski/ogrodnik-ai:latest
    container_name: ogrodnik-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Baza SQLite, zdjęcia akcji i mapy ogrodu - trwałe między restartami/rebuildami.
      - ogrodnik_data:/app/data
    # Jeśli Home Assistant działa lokalnie na tej samej maszynie (np. jako kolejny
    # kontener albo na hoście), a "http://homeassistant.local:8123" nie jest
    # widoczne z wewnątrz kontenera, odkomentuj poniższe i ustaw HA_BASE_URL na
    # http://host.docker.internal:8123 w .env:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  ogrodnik-db:
    build:
      context: .
      dockerfile: docker/db.Dockerfile
    image: ghcr.io/mbeczynski/ogrodnik-db:latest
    container_name: ogrodnik-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - ogrodnik_data:/data
    environment:
      - SQLITE_DATABASE=ogrodnik.db
    depends_on:
      - ogrodnik-ai

volumes:
  ogrodnik_data:

