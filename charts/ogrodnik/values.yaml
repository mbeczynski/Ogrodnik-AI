replicaCount: 1

image:
  repository: ghcr.io/mbeczynski/ogrodnik-ai
  tag: latest
  pullPolicy: IfNotPresent

dbImage:
  repository: coleifer/sqlite-web
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: ogrodnik.renacode.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ogrodnik-tls-cert
      hosts:
        - ogrodnik.renacode.com

persistence:
  size: 2Gi
  storageClass: local-path

secretName: ogrodnik-secret

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

dbResources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi
