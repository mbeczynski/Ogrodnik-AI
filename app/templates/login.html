<!DOCTYPE html>
<html lang="pl" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaloguj się - Ogrodnik AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
    .glass {
      background: rgba(16, 44, 27, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-emerald-950 to-teal-950 text-slate-100 flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 mb-6 text-3xl shadow-lg shadow-emerald-950/50">
      🌱
    </div>
    <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">Ogrodnik AI</h2>
    <p class="mt-2 text-sm text-emerald-400/80 font-light">Zaloguj się do panelu zarządzania ogrodem</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="glass py-8 px-6 shadow-2xl rounded-2xl sm:px-10">
      {% if error %}
      <div class="mb-6 rounded-lg bg-red-500/10 border border-red-500/20 p-4 text-sm text-red-400 flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 flex-shrink-0">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
        </svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form class="space-y-6" action="/login" method="POST">
        <div>
          <label for="username" class="block text-xs font-semibold text-emerald-400 uppercase tracking-wider">Użytkownik</label>
          <div class="mt-2">
            <input id="username" name="username" type="text" autocomplete="username" required class="block w-full rounded-xl border-0 py-3 px-4 bg-emerald-950/30 text-white placeholder-emerald-700/50 ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-emerald-500 focus:bg-emerald-950/50 sm:text-sm sm:leading-6 transition-all duration-200 outline-none" placeholder="admin">
          </div>
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold text-emerald-400 uppercase tracking-wider">Hasło</label>
          <div class="mt-2">
            <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full rounded-xl border-0 py-3 px-4 bg-emerald-950/30 text-white placeholder-emerald-700/50 ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-emerald-500 focus:bg-emerald-950/50 sm:text-sm sm:leading-6 transition-all duration-200 outline-none" placeholder="••••••••">
          </div>
        </div>

        <div>
          <button type="submit" class="flex w-full justify-center rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 py-3 px-4 text-sm font-semibold text-white shadow-lg hover:from-emerald-400 hover:to-teal-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-500 active:scale-[0.98] transition-all duration-200">
            Zaloguj się
          </button>
        </div>
      </form>
    </div>

    <div class="mt-6 text-center text-xs text-emerald-500/40">
      Mój ogród &copy; 2026. Zabezpieczono przez Ogrodnik AI.
    </div>
  </div>
</body>
</html>
